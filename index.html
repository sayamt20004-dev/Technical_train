<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Phonebook Contact Management Web Application</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1d2671);
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #addBtn {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(135deg, #ff6ec4, #7873f5);
      color: white;
    }

    .search-box {
      position: relative;
      margin-top: 15px;
    }

    /* ✅ Centered clear button */
    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: white;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 6px;
      border-radius: 50%;
    }

    #contactList {
      list-style: none;
      margin-top: 15px;
      max-height: 300px;
      overflow-y: auto;
    }

    .contact-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.15);
      padding: 10px;
      margin-top: 10px;
      border-radius: 15px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #eee;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
      font-weight: bold;
    }

    .contact-info {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .delete {
      background: #ff4d4d;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      margin-left: 10px;
      cursor: pointer;
    }

    .edit {
      background: #00c6ff;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      margin-left: 5px;
      cursor: pointer;
    }

    .sort-btn {
      width: 48%;
      margin-top: 5px;
      background: linear-gradient(135deg, #00f260, #0575e6);
      color: white;
      font-size: 14px;
    }

    .highlight {
      color: #ffe066;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📱 Phonebook</h1>

    <input type="text" id="name" placeholder="👤 Name">
    <input type="text" id="phone" placeholder="📞 Phone Number">
    <button id="addBtn" onclick="addContact()">Add Contact</button>

    <div style="display:flex; justify-content:space-between;">
      <button class="sort-btn" onclick="sortContactsByName()">Sort by Name</button>
      <button class="sort-btn" onclick="sortContactsByPhone()">Sort by Phone</button>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="🔍 Search..." onkeyup="searchContact()">
      <span class="clear-btn" onclick="clearSearch()">✖</span>
    </div>

    <ul id="contactList"></ul>
  </div>

  <script>
    let contacts = JSON.parse(localStorage.getItem("contacts")) || [];
    let editIndex = null;

    let contactMap = {};
    contacts.forEach(c => contactMap[c.name.toLowerCase()] = c);

    function saveToStorage() {
      localStorage.setItem("contacts", JSON.stringify(contacts));
      rebuildHashMap();
    }

    function rebuildHashMap() {
      contactMap = {};
      contacts.forEach(c => contactMap[c.name.toLowerCase()] = c);
    }

    function displayContacts(list = contacts) {
      const contactList = document.getElementById("contactList");
      contactList.innerHTML = "";

      list.forEach((contact, index) => {
        const li = document.createElement("li");
        li.className = "contact-card";

        const query = document.getElementById("search").value.toLowerCase();

        const name = query
          ? contact.name.replace(new RegExp(query, "gi"), m => `<span class="highlight">${m}</span>`)
          : contact.name;

        const phone = query
          ? contact.phone.replace(new RegExp(query, "gi"), m => `<span class="highlight">${m}</span>`)
          : contact.phone;

        li.innerHTML = `
          <div class="avatar">${contact.name.charAt(0).toUpperCase()}</div>
          <div class="contact-info">
            <span>${name}</span>
            <small>${phone}</small>
          </div>
          <div>
            <button class="edit" onclick="editContact(${index})">✏️</button>
            <button class="delete" onclick="deleteContact(${index})">✖</button>
          </div>
        `;
        contactList.appendChild(li);
      });
    }

    function addContact() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!name || !phone) {
        alert("Please fill all fields");
        return;
      }

      if (editIndex !== null) {
        contacts[editIndex] = { name, phone };
        editIndex = null;
        document.getElementById("addBtn").innerText = "Add Contact";
      } else {
        contacts.push({ name, phone });
      }

      saveToStorage();
      displayContacts();

      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
    }

    function deleteContact(index) {
      contacts.splice(index, 1);
      saveToStorage();
      displayContacts();
    }

    function editContact(index) {
      document.getElementById("name").value = contacts[index].name;
      document.getElementById("phone").value = contacts[index].phone;
      document.getElementById("addBtn").innerText = "Update Contact";
      editIndex = index;
    }

    function sortContactsByName() {
      contacts.sort((a, b) => a.name.localeCompare(b.name));
      saveToStorage();
      displayContacts();
    }

    function sortContactsByPhone() {
      contacts.sort((a, b) => a.phone.localeCompare(b.phone));
      saveToStorage();
      displayContacts();
    }

    function searchContact() {
      const searchInput = document.getElementById("search");
      const query = searchInput.value.toLowerCase();
      const clearBtn = document.querySelector(".clear-btn");

      // ✅ Change icon dynamically
      if (/^\d+$/.test(query)) {
        clearBtn.textContent = "📞";
      } else {
        clearBtn.textContent = "✖";
      }

      if (!query) {
        displayContacts();
        clearBtn.textContent = "✖";
        return;
      }

      if (contactMap[query]) {
        displayContacts([contactMap[query]]);
        return;
      }

      const filtered = contacts.filter(c =>
        c.name.toLowerCase().includes(query) || c.phone.includes(query)
      );

      displayContacts(filtered);
    }

    function clearSearch() {
      document.getElementById("search").value = "";
      document.querySelector(".clear-btn").textContent = "✖";
      displayContacts();
    }

    displayContacts();
  </script>
</body>

</html>
